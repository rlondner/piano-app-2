<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Glass Piano</title>

    <!-- ===================== STYLES ===================== -->
    <style>
        /* ---- Reset & Base ---- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 50%, #0a1628 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ---- Glassmorphism Utility ---- */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ---- App Container ---- */
        .app-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ---- Header ---- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        /* ---- Instrument Select ---- */
        #instrument-select {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            padding: 8px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            max-width: 220px;
        }
        #instrument-select option {
            background: #1a0533;
            color: #fff;
        }

        /* ---- Volume Control ---- */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 8px;
        }
        .volume-control label {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        #volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* ---- Piano Container ---- */
        .piano-container {
            padding: 14px;
            border-radius: 16px;
        }

        /* ---- Octave Ribbon ---- */
        .octave-ribbon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 10px 16px;
            margin-bottom: 14px;
            border-radius: 10px;
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
            touch-action: none;
        }
        .octave-ribbon:active { cursor: grabbing; }

        .arrow-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            line-height: 1;
        }
        .arrow-btn:hover { background: rgba(255, 255, 255, 0.22); }
        .arrow-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .ribbon-label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.85;
            min-width: 150px;
            text-align: center;
            font-weight: 300;
        }

        /* ---- Keys Viewport ---- */
        .keys-viewport {
            overflow: hidden;
            border-radius: 0 0 10px 10px;
        }

        .keys-track {
            display: flex;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ---- Octave Group ---- */
        .octave-group {
            position: relative;
            display: flex;
            flex-shrink: 0;
        }

        /* ---- White Keys ---- */
        .white-key {
            flex: 1;
            height: 210px;
            background: linear-gradient(to bottom,
                rgba(255, 255, 255, 0.93) 0%,
                rgba(235, 235, 245, 0.88) 100%);
            border: 1px solid rgba(190, 190, 210, 0.45);
            border-top: none;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: background 0.06s, box-shadow 0.06s;
            touch-action: none;
        }
        .white-key:hover {
            background: linear-gradient(to bottom,
                rgba(255, 255, 255, 1) 0%,
                rgba(245, 245, 255, 0.95) 100%);
        }
        .white-key.active {
            background: linear-gradient(to bottom,
                rgba(190, 205, 255, 0.95) 0%,
                rgba(170, 185, 250, 0.90) 100%);
            box-shadow: 0 0 20px rgba(140, 165, 255, 0.5), inset 0 -4px 8px rgba(140, 165, 255, 0.15);
        }

        /* ---- Black Keys ---- */
        .black-key {
            position: absolute;
            top: 0;
            width: 9%;
            height: 135px;
            background: linear-gradient(to bottom,
                rgba(25, 25, 35, 0.96) 0%,
                rgba(45, 45, 60, 0.92) 100%);
            border: 1px solid rgba(70, 70, 95, 0.3);
            border-top: none;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            z-index: 2;
            transition: background 0.06s, box-shadow 0.06s;
            touch-action: none;
        }
        .black-key:hover {
            background: linear-gradient(to bottom,
                rgba(45, 45, 60, 0.96) 0%,
                rgba(65, 65, 85, 0.92) 100%);
        }
        .black-key.active {
            background: linear-gradient(to bottom,
                rgba(75, 85, 135, 0.96) 0%,
                rgba(95, 105, 155, 0.92) 100%);
            box-shadow: 0 0 14px rgba(110, 130, 255, 0.45);
        }

        /* Black key positions (% of octave group width) */
        .black-key[data-semitone="1"]  { left: 10.5%; }
        .black-key[data-semitone="3"]  { left: 24.8%; }
        .black-key[data-semitone="6"]  { left: 53.3%; }
        .black-key[data-semitone="8"]  { left: 67.6%; }
        .black-key[data-semitone="10"] { left: 82.0%; }

        /* ---- Keyboard Hint ---- */
        .keyboard-hint {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.35;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* ---- Responsive: Portrait / Mobile ---- */
        @media (max-width: 768px) {
            .app-container { padding: 10px; }
            .header {
                padding: 10px 14px;
                justify-content: center;
                text-align: center;
            }
            .header h1 { font-size: 1rem; width: 100%; }
            #instrument-select { max-width: 180px; font-size: 0.8rem; }
            #volume-slider { width: 70px; }
            .white-key { height: 190px; }
            .black-key { height: 120px; }
            .keyboard-hint { display: none; }
        }

        @media (max-width: 480px) {
            .white-key { height: 170px; }
            .black-key { height: 108px; }
            .controls { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ===================== HTML ===================== -->
    <div class="app-container">

        <!-- Header -->
        <header class="header glass">
            <h1>Glass Piano</h1>
            <div class="controls">
                <select id="instrument-select">
                    <option value="fender-rhodes">Fender Rhodes</option>
                    <option value="wurlitzer">Wurlitzer E-Piano</option>
                    <option value="cp70">Yamaha CP-70</option>
                    <option value="cp80">Yamaha CP-80</option>
                    <option value="clavinet">Hohner Clavinet</option>
                    <option value="pianet">Hohner Pianet</option>
                    <option value="juno106">Juno 106</option>
                    <option value="rmi-electra">RMI Electra-piano</option>
                    <option value="dx7-organ">Yamaha DX7 Organ</option>
                    <option value="nord-grand">Nord Stage 4 Grand</option>
                </select>
                <div class="volume-control glass">
                    <label for="volume-slider">Vol</label>
                    <input type="range" id="volume-slider" min="0" max="100" value="75">
                </div>
            </div>
        </header>

        <!-- Piano -->
        <div class="piano-container glass">
            <!-- Octave Ribbon -->
            <div class="octave-ribbon glass" id="octave-ribbon">
                <button class="arrow-btn" id="arrow-left" aria-label="Previous octave">&#8249;</button>
                <span class="ribbon-label" id="ribbon-label">C2 &ndash; B3</span>
                <button class="arrow-btn" id="arrow-right" aria-label="Next octave">&#8250;</button>
            </div>
            <!-- Keys -->
            <div class="keys-viewport" id="keys-viewport">
                <div class="keys-track" id="keys-track">
                    <!-- Octave groups injected by JS -->
                </div>
            </div>
        </div>

        <div class="keyboard-hint">
            Keyboard: Z&thinsp;S&thinsp;X&thinsp;D&thinsp;C&thinsp;V&thinsp;G&thinsp;B&thinsp;H&thinsp;N&thinsp;J&thinsp;M (lower octave) &middot; Q&thinsp;2&thinsp;W&thinsp;3&thinsp;E&thinsp;R&thinsp;5&thinsp;T&thinsp;6&thinsp;Y&thinsp;7&thinsp;U (upper octave)
        </div>
    </div>

    <!-- ===================== TONE.JS CDN ===================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- ===================== APPLICATION SCRIPT ===================== -->
    <script>
    (() => {
        'use strict';

        /* =========================================================
           CONSTANTS
           ========================================================= */
        const FIRST_OCTAVE = 2;
        const NUM_OCTAVES  = 5;   // C2 – B6
        const NOTE_NAMES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const WHITE_INDICES = [0, 2, 4, 5, 7, 9, 11];          // C D E F G A B
        const BLACK_INDICES = [1, 3, 6, 8, 10];                 // C# D# F# G# A#
        const BREAKPOINT    = 768;                               // px – 1 vs 2 octave threshold

        /* Keyboard → semitone maps (0=C … 11=B) */
        const KB_LOWER = { z:0, s:1, x:2, d:3, c:4, v:5, g:6, b:7, h:8, n:9, j:10, m:11 };
        const KB_UPPER = { q:0, '2':1, w:2, '3':3, e:4, r:5, '5':6, t:7, '6':8, y:9, '7':10, u:11 };

        /* =========================================================
           STATE
           ========================================================= */
        let startOctaveIdx  = 0;   // 0-based index into the 5 octaves
        let visibleOctaves  = 2;
        let currentPreset   = 'fender-rhodes';
        let currentSynth    = null;
        let currentEffects  = [];
        let toneStarted     = false;
        const activePointers = new Map();   // pointerId → note
        const activeKBNotes  = new Map();   // physical key → note
        const noteElMap      = new Map();   // note string → DOM element

        /* =========================================================
           DOM REFS
           ========================================================= */
        const keysViewport   = document.getElementById('keys-viewport');
        const keysTrack      = document.getElementById('keys-track');
        const ribbonLabel    = document.getElementById('ribbon-label');
        const arrowLeft      = document.getElementById('arrow-left');
        const arrowRight     = document.getElementById('arrow-right');
        const octaveRibbon   = document.getElementById('octave-ribbon');
        const instrumentSel  = document.getElementById('instrument-select');
        const volumeSlider   = document.getElementById('volume-slider');

        /* =========================================================
           INSTRUMENT PRESETS
           ========================================================= */
        const PRESETS = {
            'fender-rhodes': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 3.01,
                    modulationIndex: 14,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.002, decay: 1.4, sustain: 0.28, release: 1.2 },
                    modulation: { type: 'square' },
                    modulationEnvelope: { attack: 0.002, decay: 0.2, sustain: 0, release: 0.4 }
                },
                effects: [
                    { type: 'Tremolo', opts: { frequency: 3.5, depth: 0.35 }, start: true },
                    { type: 'Reverb', opts: { decay: 2.2, wet: 0.18 } }
                ]
            },
            'wurlitzer': {
                voice: Tone.AMSynth,
                options: {
                    harmonicity: 2.0,
                    oscillator: { type: 'sawtooth' },
                    envelope: { attack: 0.004, decay: 0.8, sustain: 0.2, release: 0.6 },
                    modulation: { type: 'square' },
                    modulationEnvelope: { attack: 0.002, decay: 0.15, sustain: 0, release: 0.3 }
                },
                effects: [
                    { type: 'Distortion', opts: { distortion: 0.08, wet: 0.5 } },
                    { type: 'Reverb', opts: { decay: 1.5, wet: 0.12 } }
                ]
            },
            'cp70': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 5.07,
                    modulationIndex: 18,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.001, decay: 2.0, sustain: 0.15, release: 1.8 },
                    modulation: { type: 'sine' },
                    modulationEnvelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.6 }
                },
                effects: [
                    { type: 'Reverb', opts: { decay: 2.5, wet: 0.2 } }
                ]
            },
            'cp80': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 4.01,
                    modulationIndex: 12,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.001, decay: 2.5, sustain: 0.22, release: 2.0 },
                    modulation: { type: 'sine' },
                    modulationEnvelope: { attack: 0.001, decay: 0.4, sustain: 0.05, release: 0.8 }
                },
                effects: [
                    { type: 'Reverb', opts: { decay: 3.0, wet: 0.22 } }
                ]
            },
            'clavinet': {
                voice: Tone.Synth,
                options: {
                    oscillator: { type: 'sawtooth' },
                    envelope: { attack: 0.001, decay: 0.25, sustain: 0.05, release: 0.12 }
                },
                effects: [
                    { type: 'AutoFilter', opts: { frequency: 4, baseFrequency: 800, octaves: 2.6, wet: 0.6 }, start: true },
                    { type: 'Distortion', opts: { distortion: 0.15, wet: 0.4 } }
                ]
            },
            'pianet': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 2.5,
                    modulationIndex: 8,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.003, decay: 1.0, sustain: 0.1, release: 0.8 },
                    modulation: { type: 'triangle' },
                    modulationEnvelope: { attack: 0.003, decay: 0.15, sustain: 0, release: 0.4 }
                },
                effects: [
                    { type: 'Tremolo', opts: { frequency: 5, depth: 0.2 }, start: true },
                    { type: 'Reverb', opts: { decay: 1.8, wet: 0.15 } }
                ]
            },
            'juno106': {
                voice: Tone.Synth,
                options: {
                    oscillator: { type: 'fatsawtooth', count: 3, spread: 20 },
                    envelope: { attack: 0.06, decay: 0.6, sustain: 0.6, release: 0.8 }
                },
                effects: [
                    { type: 'Chorus', opts: { frequency: 1.5, delayTime: 3.5, depth: 0.7, wet: 0.5 }, start: true },
                    { type: 'Reverb', opts: { decay: 2.0, wet: 0.2 } }
                ]
            },
            'rmi-electra': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 1.0,
                    modulationIndex: 4,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.01, decay: 0.8, sustain: 0.65, release: 1.5 },
                    modulation: { type: 'sine' },
                    modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.4, release: 0.8 }
                },
                effects: [
                    { type: 'Reverb', opts: { decay: 3.5, wet: 0.28 } }
                ]
            },
            'dx7-organ': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 2.01,
                    modulationIndex: 22,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.005, decay: 0.3, sustain: 0.7, release: 0.2 },
                    modulation: { type: 'sine' },
                    modulationEnvelope: { attack: 0.005, decay: 0.1, sustain: 0.5, release: 0.1 }
                },
                effects: [
                    { type: 'Chorus', opts: { frequency: 2, delayTime: 2.5, depth: 0.5, wet: 0.35 }, start: true },
                    { type: 'Reverb', opts: { decay: 1.5, wet: 0.15 } }
                ]
            },
            'nord-grand': {
                voice: Tone.FMSynth,
                options: {
                    harmonicity: 6.01,
                    modulationIndex: 20,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.001, decay: 3.0, sustain: 0.18, release: 2.5 },
                    modulation: { type: 'sine' },
                    modulationEnvelope: { attack: 0.001, decay: 0.5, sustain: 0.02, release: 1.0 }
                },
                effects: [
                    { type: 'Reverb', opts: { decay: 3.5, wet: 0.25 } }
                ]
            }
        };

        /* =========================================================
           AUDIO ENGINE
           ========================================================= */
        async function ensureTone() {
            if (!toneStarted) {
                await Tone.start();
                toneStarted = true;
            }
        }

        function buildSynth(presetKey) {
            /* Dispose previous */
            if (currentSynth) {
                currentSynth.disconnect();
                currentSynth.dispose();
            }
            currentEffects.forEach(e => { e.disconnect(); e.dispose(); });
            currentEffects = [];

            const p = PRESETS[presetKey];
            currentSynth = new Tone.PolySynth(p.voice, p.options);
            currentSynth.maxPolyphony = 12;

            currentEffects = p.effects.map(e => {
                const fx = new Tone[e.type](e.opts);
                if (e.start && typeof fx.start === 'function') fx.start();
                return fx;
            });

            if (currentEffects.length > 0) {
                currentSynth.chain(...currentEffects, Tone.getDestination());
            } else {
                currentSynth.toDestination();
            }
        }

        function noteOn(note) {
            if (!currentSynth) return;
            currentSynth.triggerAttack(note, Tone.now());
            const el = noteElMap.get(note);
            if (el) el.classList.add('active');
        }

        function noteOff(note) {
            if (!currentSynth) return;
            currentSynth.triggerRelease(note, Tone.now());
            const el = noteElMap.get(note);
            if (el) el.classList.remove('active');
        }

        function setVolume(val) {
            const gain = val / 100;
            Tone.getDestination().volume.value = gain === 0 ? -Infinity : Tone.gainToDb(gain);
        }

        /* =========================================================
           PIANO KEY RENDERER
           ========================================================= */
        function buildKeys() {
            keysTrack.innerHTML = '';
            noteElMap.clear();

            for (let oi = 0; oi < NUM_OCTAVES; oi++) {
                const octNum = FIRST_OCTAVE + oi;
                const group = document.createElement('div');
                group.className = 'octave-group';

                /* White keys */
                WHITE_INDICES.forEach(semi => {
                    const note = NOTE_NAMES[semi] + octNum;
                    const key = document.createElement('div');
                    key.className = 'white-key';
                    key.dataset.note = note;
                    group.appendChild(key);
                    noteElMap.set(note, key);
                });

                /* Black keys */
                BLACK_INDICES.forEach(semi => {
                    const note = NOTE_NAMES[semi] + octNum;
                    const key = document.createElement('div');
                    key.className = 'black-key';
                    key.dataset.note = note;
                    key.dataset.semitone = String(semi);
                    group.appendChild(key);
                    noteElMap.set(note, key);
                });

                keysTrack.appendChild(group);
            }

            attachKeyPointerEvents();
        }

        /* =========================================================
           POINTER (MOUSE + TOUCH) EVENTS ON KEYS
           ========================================================= */
        function attachKeyPointerEvents() {
            keysTrack.querySelectorAll('.white-key, .black-key').forEach(key => {
                key.addEventListener('pointerdown', async (e) => {
                    e.preventDefault();
                    await ensureTone();
                    const note = key.dataset.note;
                    activePointers.set(e.pointerId, note);
                    noteOn(note);
                });
                key.addEventListener('pointerup', (e) => {
                    const note = activePointers.get(e.pointerId);
                    if (note) { noteOff(note); activePointers.delete(e.pointerId); }
                });
                key.addEventListener('pointerleave', (e) => {
                    const note = activePointers.get(e.pointerId);
                    if (note) { noteOff(note); activePointers.delete(e.pointerId); }
                });
                key.addEventListener('pointercancel', (e) => {
                    const note = activePointers.get(e.pointerId);
                    if (note) { noteOff(note); activePointers.delete(e.pointerId); }
                });
            });
        }

        /* =========================================================
           VIEWPORT / RESPONSIVE
           ========================================================= */
        function computeVisibleOctaves() {
            return window.innerWidth <= BREAKPOINT ? 1 : 2;
        }

        function updateViewport() {
            visibleOctaves = computeVisibleOctaves();
            const vpWidth = keysViewport.offsetWidth;
            const octW = vpWidth / visibleOctaves;

            document.querySelectorAll('.octave-group').forEach(g => {
                g.style.width = octW + 'px';
            });

            clampStart();
            applyTransform(octW);
            updateRibbon();
        }

        function clampStart() {
            const maxStart = NUM_OCTAVES - visibleOctaves;
            if (startOctaveIdx > maxStart) startOctaveIdx = maxStart;
            if (startOctaveIdx < 0) startOctaveIdx = 0;
        }

        function applyTransform(octW) {
            if (octW === undefined) {
                octW = keysViewport.offsetWidth / visibleOctaves;
            }
            keysTrack.style.transform = `translateX(-${startOctaveIdx * octW}px)`;
        }

        function updateRibbon() {
            const lo = FIRST_OCTAVE + startOctaveIdx;
            const hi = FIRST_OCTAVE + startOctaveIdx + visibleOctaves - 1;
            ribbonLabel.textContent = `C${lo} \u2013 B${hi}`;
            arrowLeft.disabled  = (startOctaveIdx === 0);
            arrowRight.disabled = (startOctaveIdx >= NUM_OCTAVES - visibleOctaves);
        }

        function shiftOctave(delta) {
            startOctaveIdx += delta;
            clampStart();
            applyTransform();
            updateRibbon();
        }

        /* ResizeObserver for responsive updates */
        const ro = new ResizeObserver(() => updateViewport());

        /* =========================================================
           OCTAVE RIBBON SWIPE
           ========================================================= */
        let ribbonDragStartX = null;
        const SWIPE_THRESHOLD = 40;

        function onRibbonPointerDown(e) {
            if (e.target.closest('.arrow-btn')) return; // let button clicks through
            ribbonDragStartX = e.clientX;
            octaveRibbon.setPointerCapture(e.pointerId);
        }
        function onRibbonPointerMove(e) {
            if (ribbonDragStartX === null) return;
            const dx = e.clientX - ribbonDragStartX;
            if (Math.abs(dx) >= SWIPE_THRESHOLD) {
                shiftOctave(dx < 0 ? 1 : -1);
                ribbonDragStartX = e.clientX;   // reset for continuous drag
            }
        }
        function onRibbonPointerUp() {
            ribbonDragStartX = null;
        }

        /* =========================================================
           COMPUTER KEYBOARD SHORTCUTS
           ========================================================= */
        function noteFromKeyboard(physicalKey) {
            const k = physicalKey.toLowerCase();
            if (k in KB_LOWER) {
                const oct = FIRST_OCTAVE + startOctaveIdx;
                return NOTE_NAMES[KB_LOWER[k]] + oct;
            }
            if (k in KB_UPPER) {
                const oct = FIRST_OCTAVE + startOctaveIdx + 1;
                if (oct > FIRST_OCTAVE + NUM_OCTAVES - 1) return null;
                return NOTE_NAMES[KB_UPPER[k]] + oct;
            }
            return null;
        }

        async function onKeyDown(e) {
            if (e.repeat) return;
            if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
            const note = noteFromKeyboard(e.key);
            if (!note) return;
            e.preventDefault();
            await ensureTone();
            activeKBNotes.set(e.key.toLowerCase(), note);
            noteOn(note);
        }

        function onKeyUp(e) {
            const k = e.key.toLowerCase();
            const note = activeKBNotes.get(k);
            if (!note) return;
            noteOff(note);
            activeKBNotes.delete(k);
        }

        /* =========================================================
           EVENT WIRING & INIT
           ========================================================= */
        function init() {
            buildKeys();
            buildSynth(currentPreset);
            setVolume(parseInt(volumeSlider.value, 10));

            /* Responsive */
            ro.observe(keysViewport);
            updateViewport();

            /* Ribbon arrows */
            arrowLeft.addEventListener('click', () => shiftOctave(-1));
            arrowRight.addEventListener('click', () => shiftOctave(1));

            /* Ribbon swipe (pointer events) */
            octaveRibbon.addEventListener('pointerdown', onRibbonPointerDown);
            octaveRibbon.addEventListener('pointermove', onRibbonPointerMove);
            octaveRibbon.addEventListener('pointerup', onRibbonPointerUp);
            octaveRibbon.addEventListener('pointercancel', onRibbonPointerUp);

            /* Instrument switch */
            instrumentSel.addEventListener('change', async () => {
                await ensureTone();
                currentPreset = instrumentSel.value;
                buildSynth(currentPreset);
            });

            /* Volume */
            volumeSlider.addEventListener('input', () => {
                setVolume(parseInt(volumeSlider.value, 10));
            });

            /* Keyboard */
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
        }

        /* Kick it off once the DOM is ready */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
