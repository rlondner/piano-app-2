<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glassmorphic Synth Piano</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="start-overlay">
        <div class="overlay-content">
            <h1>Glass Synth</h1>
            <p>Tap to Initialize Audio</p>
        </div>
    </div>

    <div class="app-container">
        <header class="glass-panel">
            <div class="logo">Glass Synth</div>
            <select id="instrument-select" class="glass-select">
                <option value="fender_rhodes">Fender Rhodes</option>
                <option value="wurlitzer">Wurlitzer EP</option>
                <option value="yamaha_cp70">Yamaha CP-70</option>
                <option value="yamaha_cp80">Yamaha CP-80</option>
                <option value="hohner_clavinet">Hohner Clavinet</option>
                <option value="hohner_pianet">Hohner Pianet</option>
                <option value="juno_106">Juno 106</option>
                <option value="rmi_electra">RMI Electra-piano</option>
                <option value="dx7_organ">Yamaha DX7 Organ</option>
                <option value="nord_stage">Nord Stage 4 Grand</option>
            </select>
        </header>

        <div class="ribbon-container glass-panel">
            <button class="nav-arrow left" id="nav-left">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="ribbon-content" id="ribbon-label">
                <span class="range-text">Octave: C3 - B3</span>
            </div>
            <button class="nav-arrow right" id="nav-right">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <div class="piano-viewport glass-panel">
            <div class="piano-strip" id="piano-strip">
                <!-- Keys will be generated by JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
