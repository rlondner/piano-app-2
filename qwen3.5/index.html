<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Web Synth Piano</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/1.7.9/Tone.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Glassmorphic Synth Piano</h1>
      <div class="controls">
        <div class="control-group">
          <label for="instrument">Instrument:</label>
          <select id="instrument">
            <option value="grand-piano">Grand Piano</option>
            <option value="electric-piano">Electric Piano</option>
            <option value="fender-rhodes">Fender Rhodes</option>
            <option value="wurlitzer">Wurlitzer</option>
            <option value="dx7-organ">DX7 Organ</option>
            <option value="nord-stage">Nord Stage</option>
            <option value="strings">Strings</option>
            <option value="pad">Pad</option>
            <option value="bells">Bells</option>
            <option value="synth-lead">Synth Lead</option>
          </select>
        </div>
        <div class="control-group">
          <label for="volume">Volume:</label>
          <input type="range" id="volume" min="0" max="100" value="75">
        </div>
      </div>
    </header>

    <main class="piano-container">
      <div class="ribbon-container" id="ribbon">
        <button class="nav-btn prev-octave" aria-label="Previous octave">◀</button>
        <div class="octave-display" id="octave-display">C2 - C3</div>
        <button class="nav-btn next-octave" aria-label="Next octave">◀</button>
      </div>

      <div class="keyboard" id="keyboard">
        <!-- Keys generated by JS -->
      </div>
    </main>

    <footer class="footer">
      <div class="keyboard-hints">
        <span>Keyboard: A,S,D,F,G,H,J (white) | W,E,T,Y,U (black) | Z/X (octave shift)</span>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
