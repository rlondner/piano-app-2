<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glassmorphism Piano</title>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-bg-hover: rgba(255,255,255,0.14);
    --glass-blur: 12px;
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.37);
    --white-key-w: 48px;
    --white-key-h: 200px;
    --black-key-w: 30px;
    --black-key-h: 120px;
    --keys-per-octave: 7;
    --octave-w: calc(var(--white-key-w) * var(--keys-per-octave));
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #0a1628 50%, #0d0d2b 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  /* Overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(10,5,30,0.85);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { font-size: 2.4rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  #overlay p { font-size: 1.1rem; opacity: 0.7; }

  /* Glass utility */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 12px;
  }

  /* Header */
  header {
    width: min(95vw, 800px);
    margin: 20px auto 12px;
    padding: 14px 20px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  }
  header h1 { font-size: 1.15rem; letter-spacing: 0.04em; margin-right: auto; }
  header select, header button {
    background: rgba(255,255,255,0.1);
    color: #fff; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 6px 12px; font-size: 0.85rem;
    cursor: pointer; transition: background 0.2s;
  }
  header select:hover, header button:hover { background: var(--glass-bg-hover); }
  header select option { background: #1a0533; color: #fff; }
  header button.active { background: rgba(140,100,255,0.35); border-color: rgba(140,100,255,0.6); }
  #recordBtn.recording { background: rgba(255,60,60,0.4); border-color: rgba(255,60,60,0.7); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Octave Ribbon */
  .ribbon {
    width: min(95vw, 800px);
    margin: 0 auto 12px;
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .ribbon button {
    background: rgba(255,255,255,0.1); color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; width: 36px; height: 36px;
    font-size: 1.2rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .ribbon button:hover { background: var(--glass-bg-hover); }
  .ribbon button:disabled { opacity: 0.3; cursor: default; }
  .ribbon span { font-size: 0.95rem; min-width: 90px; text-align: center; }

  /* Piano */
  .piano-container {
    width: min(95vw, 800px);
    margin: 0 auto;
    padding: 20px;
  }
  .keys-viewport {
    overflow: hidden;
    position: relative;
    width: 100%;
  }
  .keys-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .octave-group {
    flex-shrink: 0;
    position: relative;
    display: flex;
    width: var(--octave-w);
  }

  /* White keys */
  .key-white {
    flex: 1;
    height: var(--white-key-h);
    background: linear-gradient(180deg, #f8f8f8 0%, #e8e8e8 100%);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 0 0 6px 6px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: background 0.08s, transform 0.08s;
  }
  .key-white:active, .key-white.pressed {
    background: linear-gradient(180deg, #e0e0e0 0%, #d0d0d0 100%);
  }

  /* Black keys */
  .key-black {
    position: absolute;
    width: var(--black-key-w);
    height: var(--black-key-h);
    background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 0 0 4px 4px;
    z-index: 2;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
  }
  .key-black:active, .key-black.pressed {
    background: linear-gradient(180deg, #3a3a3a 0%, #222 100%);
  }

  /* Feedback: color */
  body[data-feedback="color"] .key-white.pressed {
    background: linear-gradient(180deg, rgba(140,100,255,0.5) 0%, rgba(100,60,220,0.4) 100%) !important;
    box-shadow: 0 0 18px rgba(140,100,255,0.6);
  }
  body[data-feedback="color"] .key-black.pressed {
    background: linear-gradient(180deg, rgba(180,130,255,0.6) 0%, rgba(140,80,255,0.5) 100%) !important;
    box-shadow: 0 0 14px rgba(140,100,255,0.5);
  }

  /* Feedback: depress */
  body[data-feedback="depress"] .key-white.pressed {
    transform: scaleY(0.97);
    transform-origin: top;
    background: linear-gradient(180deg, #ddd 0%, #ccc 100%);
  }
  body[data-feedback="depress"] .key-black.pressed {
    transform: translateY(3px);
    background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
  }

  /* Keyboard hint */
  .hint {
    text-align: center;
    margin-top: 14px;
    font-size: 0.8rem;
    opacity: 0.5;
  }

  /* Responsive */
  @media (max-width: 768px) {
    :root {
      --white-key-w: 42px;
      --white-key-h: 160px;
      --black-key-w: 26px;
      --black-key-h: 96px;
    }
    header { padding: 10px 14px; gap: 8px; }
    header h1 { font-size: 1rem; width: 100%; }
    .piano-container { padding: 12px; }
    .hint { display: none; }
  }
</style>
</head>
<body data-feedback="color">

<!-- Click-to-start overlay -->
<div id="overlay">
  <h1>Glassmorphism Piano</h1>
  <p>Tap anywhere to start</p>
</div>

<!-- Header -->
<header class="glass">
  <h1>Glassmorphism Piano</h1>
  <select id="presetSelect" aria-label="Instrument preset"></select>
  <button id="feedbackBtn" title="Toggle visual feedback">Feedback: Color</button>
  <button id="inputModeBtn" title="Toggle input mode">Input: Keyboard</button>
  <button id="recordBtn" title="Record audio">Record</button>
</header>

<!-- Octave Ribbon -->
<div class="ribbon glass" id="ribbon">
  <button id="octLeft" aria-label="Previous octave">&#9664;</button>
  <span id="octLabel">C2 – B3</span>
  <button id="octRight" aria-label="Next octave">&#9654;</button>
</div>

<!-- Piano -->
<div class="piano-container glass">
  <div class="keys-viewport" id="viewport">
    <div class="keys-track" id="track"></div>
  </div>
</div>

<p class="hint" id="hint">White: A–J + K L ; ' \ &nbsp; Black: W E T Y U + I O P [ &nbsp; Arrows: change octave.</p>

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
<script>
(function() {
  "use strict";

  // ── Constants ──────────────────────────────────────────────
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const WHITE_NOTES = ['C','D','E','F','G','A','B'];
  const BLACK_NOTE_MAP = {0:'C#', 1:'D#', 3:'F#', 4:'G#', 5:'A#'}; // index in white keys
  // Black key left offsets as fraction of octave width
  const BLACK_OFFSETS = {
    'C#': 0 / 7 + 0.5 / 7,
    'D#': 1 / 7 + 0.5 / 7,
    'F#': 3 / 7 + 0.5 / 7,
    'G#': 4 / 7 + 0.5 / 7,
    'A#': 5 / 7 + 0.5 / 7
  };

  const TOTAL_OCTAVES = 5;
  const BASE_OCTAVE = 2; // C2 through B6

  const KEYBOARD_MAP = {
    // First octave (home row = white, QWERTY row = black)
    'a': { note: 'C', oct: 0 }, 'w': { note: 'C#', oct: 0 },
    's': { note: 'D', oct: 0 }, 'e': { note: 'D#', oct: 0 },
    'd': { note: 'E', oct: 0 },
    'f': { note: 'F', oct: 0 }, 't': { note: 'F#', oct: 0 },
    'g': { note: 'G', oct: 0 }, 'y': { note: 'G#', oct: 0 },
    'h': { note: 'A', oct: 0 }, 'u': { note: 'A#', oct: 0 },
    'j': { note: 'B', oct: 0 },
    // Second octave (K onwards)
    'k': { note: 'C', oct: 1 }, 'o': { note: 'C#', oct: 1 },
    'l': { note: 'D', oct: 1 }, 'p': { note: 'D#', oct: 1 },
    ';': { note: 'E', oct: 1 },
    "'": { note: 'F', oct: 1 }, ']': { note: 'F#', oct: 1 },
    '\\': { note: 'G', oct: 1 }
  };

  // Fallback: physical key codes for punctuation keys that may be dead keys
  // on international keyboards (e.g. ' is a dead key in some layouts)
  const CODE_TO_KEY = {
    'Semicolon': ';', 'Quote': "'",
    'BracketLeft': '[', 'Backslash': '\\', 'BracketRight': ']'
  };

  // ── State ──────────────────────────────────────────────────
  let audioStarted = false;
  let synth = null;
  let effectsChain = [];
  let visibleOctaves = 2;
  let startOctaveIdx = 0;
  let inputMode = 'keyboard'; // 'mouse' | 'keyboard'
  let feedbackMode = 'color'; // 'color' | 'depress'
  let recording = false;
  let mediaRecorder = null;
  let recordedChunks = [];
  const activePointers = new Map(); // pointerId -> noteString
  const activeKeys = new Map(); // keyboard key -> noteString currently sounding

  // ── DOM refs ───────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const presetSelect = document.getElementById('presetSelect');
  const feedbackBtn = document.getElementById('feedbackBtn');
  const inputModeBtn = document.getElementById('inputModeBtn');
  const recordBtn = document.getElementById('recordBtn');
  const octLeft = document.getElementById('octLeft');
  const octRight = document.getElementById('octRight');
  const octLabel = document.getElementById('octLabel');
  const ribbon = document.getElementById('ribbon');
  const viewport = document.getElementById('viewport');
  const track = document.getElementById('track');
  const hint = document.getElementById('hint');

  // ── Presets ────────────────────────────────────────────────
  const PRESETS = [
    {
      name: 'Fender Rhodes',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 3.01, modulationIndex: 14,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.005, decay: 0.6, sustain: 0.2, release: 1.2 },
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.01, decay: 0.5, sustain: 0.2, release: 0.5 }
        });
        const trem = new Tone.Tremolo(4, 0.3).start();
        const rev = new Tone.Reverb({ decay: 2.5, wet: 0.25 });
        s.chain(trem, rev, Tone.getDestination());
        return { synth: s, effects: [trem, rev] };
      }
    },
    {
      name: 'Wurlitzer',
      build: () => {
        const s = new Tone.PolySynth(Tone.AMSynth, {
          harmonicity: 2,
          oscillator: { type: 'square' },
          envelope: { attack: 0.003, decay: 0.4, sustain: 0.15, release: 0.8 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.3 }
        });
        const dist = new Tone.Distortion(0.15);
        const rev = new Tone.Reverb({ decay: 2, wet: 0.2 });
        s.chain(dist, rev, Tone.getDestination());
        return { synth: s, effects: [dist, rev] };
      }
    },
    {
      name: 'Yamaha CP-70',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 1.5, modulationIndex: 8,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.002, decay: 0.8, sustain: 0.3, release: 1.5 },
          modulation: { type: 'triangle' },
          modulationEnvelope: { attack: 0.005, decay: 0.5, sustain: 0.3, release: 0.8 }
        });
        const rev = new Tone.Reverb({ decay: 3, wet: 0.3 });
        s.chain(rev, Tone.getDestination());
        return { synth: s, effects: [rev] };
      }
    },
    {
      name: 'Yamaha CP-80',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 2, modulationIndex: 6,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.003, decay: 0.9, sustain: 0.35, release: 1.8 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.01, decay: 0.4, sustain: 0.3, release: 0.6 }
        });
        const chorus = new Tone.Chorus(3, 2.5, 0.5).start();
        const rev = new Tone.Reverb({ decay: 3.5, wet: 0.28 });
        s.chain(chorus, rev, Tone.getDestination());
        return { synth: s, effects: [chorus, rev] };
      }
    },
    {
      name: 'Hohner Clavinet',
      build: () => {
        const s = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: 'sawtooth' },
          envelope: { attack: 0.001, decay: 0.3, sustain: 0.05, release: 0.3 }
        });
        const filt = new Tone.AutoFilter('8n', 200, 6).start();
        const dist = new Tone.Distortion(0.3);
        s.chain(filt, dist, Tone.getDestination());
        return { synth: s, effects: [filt, dist] };
      }
    },
    {
      name: 'Hohner Pianet',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 4, modulationIndex: 4,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.005, decay: 0.5, sustain: 0.15, release: 1 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.02, decay: 0.3, sustain: 0.1, release: 0.4 }
        });
        const trem = new Tone.Tremolo(5, 0.25).start();
        const rev = new Tone.Reverb({ decay: 2, wet: 0.2 });
        s.chain(trem, rev, Tone.getDestination());
        return { synth: s, effects: [trem, rev] };
      }
    },
    {
      name: 'Juno 106',
      build: () => {
        const s = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: 'fatsawtooth', spread: 30, count: 3 },
          envelope: { attack: 0.08, decay: 0.6, sustain: 0.6, release: 1.5 }
        });
        const chorus = new Tone.Chorus(1.5, 3.5, 0.7).start();
        const rev = new Tone.Reverb({ decay: 3, wet: 0.3 });
        s.chain(chorus, rev, Tone.getDestination());
        return { synth: s, effects: [chorus, rev] };
      }
    },
    {
      name: 'RMI Electra-piano',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 6, modulationIndex: 20,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.002, decay: 0.5, sustain: 0.25, release: 1 },
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.5 }
        });
        const rev = new Tone.Reverb({ decay: 2.5, wet: 0.25 });
        s.chain(rev, Tone.getDestination());
        return { synth: s, effects: [rev] };
      }
    },
    {
      name: 'Yamaha DX7 Organ',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 1, modulationIndex: 12,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.01, decay: 0.1, sustain: 0.8, release: 0.3 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.8, release: 0.3 }
        });
        const chorus = new Tone.Chorus(2, 2, 0.4).start();
        const rev = new Tone.Reverb({ decay: 2, wet: 0.2 });
        s.chain(chorus, rev, Tone.getDestination());
        return { synth: s, effects: [chorus, rev] };
      }
    },
    {
      name: 'Nord Stage 4 Grand',
      build: () => {
        const s = new Tone.PolySynth(Tone.FMSynth, {
          harmonicity: 2, modulationIndex: 3,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 1.2, sustain: 0.4, release: 2 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.005, decay: 0.8, sustain: 0.3, release: 1 }
        });
        const rev = new Tone.Reverb({ decay: 4, wet: 0.35 });
        s.chain(rev, Tone.getDestination());
        return { synth: s, effects: [rev] };
      }
    }
  ];

  // ── Populate preset select ─────────────────────────────────
  PRESETS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = p.name;
    presetSelect.appendChild(opt);
  });

  // ── Build Keys ─────────────────────────────────────────────
  function buildKeys() {
    track.innerHTML = '';
    for (let oct = 0; oct < TOTAL_OCTAVES; oct++) {
      const octNum = BASE_OCTAVE + oct;
      const group = document.createElement('div');
      group.className = 'octave-group';
      group.dataset.octave = octNum;

      // White keys
      WHITE_NOTES.forEach(note => {
        const key = document.createElement('div');
        key.className = 'key-white';
        key.dataset.note = note + octNum;
        group.appendChild(key);
      });

      // Black keys
      Object.entries(BLACK_OFFSETS).forEach(([note, frac]) => {
        const key = document.createElement('div');
        key.className = 'key-black';
        key.dataset.note = note + octNum;
        const bkw = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--black-key-w'));
        key.style.left = `calc(${frac * 100}% - ${bkw / 2}px)`;
        group.appendChild(key);
      });

      track.appendChild(group);
    }
  }

  // ── Viewport / Slide ───────────────────────────────────────
  function getOctaveWidth() {
    const group = track.querySelector('.octave-group');
    return group ? group.offsetWidth : 0;
  }

  function updateVisibleOctaves() {
    const vw = viewport.offsetWidth;
    const ow = getOctaveWidth();
    if (ow === 0) return;
    visibleOctaves = vw >= ow * 2 - 10 ? 2 : 1;
    clampAndSlide();
  }

  function clampAndSlide() {
    const maxIdx = TOTAL_OCTAVES - visibleOctaves;
    startOctaveIdx = Math.max(0, Math.min(startOctaveIdx, maxIdx));
    const ow = getOctaveWidth();
    track.style.transform = `translateX(${-startOctaveIdx * ow}px)`;
    updateRibbon();
  }

  function updateRibbon() {
    const maxIdx = TOTAL_OCTAVES - visibleOctaves;
    octLeft.disabled = startOctaveIdx <= 0;
    octRight.disabled = startOctaveIdx >= maxIdx;
    const startNote = 'C' + (BASE_OCTAVE + startOctaveIdx);
    const endNote = 'B' + (BASE_OCTAVE + startOctaveIdx + visibleOctaves - 1);
    octLabel.textContent = startNote + ' – ' + endNote;
  }

  // ResizeObserver
  const ro = new ResizeObserver(() => updateVisibleOctaves());
  ro.observe(viewport);

  // ── Audio Engine ───────────────────────────────────────────
  function buildSynth(presetIdx) {
    // Dispose previous
    if (synth) { try { synth.dispose(); } catch(e){} }
    effectsChain.forEach(e => { try { e.dispose(); } catch(ex){} });
    effectsChain = [];
    synth = null;

    const result = PRESETS[presetIdx].build();
    synth = result.synth;
    effectsChain = result.effects;
    synth.maxPolyphony = 16;
  }

  function noteOn(noteStr) {
    if (!synth || !audioStarted) return;
    synth.triggerAttack(noteStr, Tone.now());
    const el = track.querySelector(`[data-note="${noteStr}"]`);
    if (el) el.classList.add('pressed');
  }

  function noteOff(noteStr) {
    if (!synth || !audioStarted) return;
    synth.triggerRelease(noteStr, Tone.now());
    const el = track.querySelector(`[data-note="${noteStr}"]`);
    if (el) el.classList.remove('pressed');
  }

  // ── Pointer Input (mouse/touch mode) ──────────────────────
  function getKeyFromEvent(e) {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (el && (el.classList.contains('key-white') || el.classList.contains('key-black'))) {
      return el;
    }
    return null;
  }

  track.addEventListener('pointerdown', e => {
    if (inputMode !== 'mouse') return;
    e.preventDefault();
    track.setPointerCapture(e.pointerId);
    const key = getKeyFromEvent(e);
    if (key) {
      const note = key.dataset.note;
      activePointers.set(e.pointerId, note);
      noteOn(note);
    }
  });

  track.addEventListener('pointermove', e => {
    if (inputMode !== 'mouse') return;
    if (!activePointers.has(e.pointerId)) return;
    e.preventDefault();
    const key = getKeyFromEvent(e);
    const prevNote = activePointers.get(e.pointerId);
    const newNote = key ? key.dataset.note : null;
    if (newNote !== prevNote) {
      if (prevNote) noteOff(prevNote);
      if (newNote) {
        noteOn(newNote);
        activePointers.set(e.pointerId, newNote);
      } else {
        activePointers.delete(e.pointerId);
      }
    }
  });

  function pointerUp(e) {
    if (inputMode !== 'mouse') return;
    const note = activePointers.get(e.pointerId);
    if (note) noteOff(note);
    activePointers.delete(e.pointerId);
  }
  track.addEventListener('pointerup', pointerUp);
  track.addEventListener('pointercancel', pointerUp);

  // ── Keyboard Input ─────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (inputMode !== 'keyboard') return;
    // Arrow keys for octave nav
    if (e.key === 'ArrowLeft') { navigateOctave(-1); return; }
    if (e.key === 'ArrowRight') { navigateOctave(1); return; }

    let k = e.key.toLowerCase();
    if (!KEYBOARD_MAP[k] && CODE_TO_KEY[e.code]) k = CODE_TO_KEY[e.code];
    const mapping = KEYBOARD_MAP[k];
    if (!mapping) return;
    e.preventDefault();
    if (activeKeys.has(k)) return;
    const octNum = BASE_OCTAVE + startOctaveIdx + mapping.oct;
    if (octNum > BASE_OCTAVE + TOTAL_OCTAVES - 1) return;
    const noteStr = mapping.note + octNum;
    activeKeys.set(k, noteStr);
    noteOn(noteStr);
  });

  document.addEventListener('keyup', e => {
    if (inputMode !== 'keyboard') return;
    let k = e.key.toLowerCase();
    if (!activeKeys.has(k) && CODE_TO_KEY[e.code]) k = CODE_TO_KEY[e.code];
    const noteStr = activeKeys.get(k);
    if (!noteStr) return;
    activeKeys.delete(k);
    noteOff(noteStr);
  });

  window.addEventListener('blur', () => {
    for (const noteStr of activeKeys.values()) noteOff(noteStr);
    activeKeys.clear();
  });

  // ── Ribbon Navigation ─────────────────────────────────────
  function navigateOctave(dir) {
    startOctaveIdx += dir;
    clampAndSlide();
  }

  octLeft.addEventListener('click', () => navigateOctave(-1));
  octRight.addEventListener('click', () => navigateOctave(1));

  // Swipe on ribbon
  let ribbonPointerDown = false;
  let ribbonStartX = 0;
  ribbon.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON') return;
    ribbonPointerDown = true;
    ribbonStartX = e.clientX;
    ribbon.setPointerCapture(e.pointerId);
  });
  ribbon.addEventListener('pointerup', e => {
    if (!ribbonPointerDown) return;
    ribbonPointerDown = false;
    const dx = e.clientX - ribbonStartX;
    if (Math.abs(dx) > 40) {
      navigateOctave(dx < 0 ? 1 : -1);
    }
  });
  ribbon.addEventListener('pointercancel', () => { ribbonPointerDown = false; });

  // ── Controls ───────────────────────────────────────────────
  presetSelect.addEventListener('change', () => {
    if (audioStarted) buildSynth(parseInt(presetSelect.value));
  });

  feedbackBtn.addEventListener('click', () => {
    feedbackMode = feedbackMode === 'color' ? 'depress' : 'color';
    document.body.dataset.feedback = feedbackMode;
    feedbackBtn.textContent = 'Feedback: ' + (feedbackMode === 'color' ? 'Color' : 'Depress');
  });

  inputModeBtn.addEventListener('click', () => {
    // Release all active notes first
    activePointers.forEach((note) => noteOff(note));
    activePointers.clear();
    activeKeys.forEach((noteStr) => noteOff(noteStr));
    activeKeys.clear();

    inputMode = inputMode === 'mouse' ? 'keyboard' : 'mouse';
    inputModeBtn.textContent = 'Input: ' + (inputMode === 'mouse' ? 'Mouse' : 'Keyboard');
    inputModeBtn.classList.toggle('active', inputMode === 'keyboard');
    hint.style.display = inputMode === 'keyboard' ? '' : '';
  });

  // ── Recording ──────────────────────────────────────────────
  recordBtn.addEventListener('click', () => {
    if (!audioStarted) return;
    if (!recording) startRecording();
    else stopRecording();
  });

  function startRecording() {
    const ctx = Tone.getContext().rawContext;
    const dest = ctx.createMediaStreamDestination();
    Tone.getDestination().connect(dest);
    mediaRecorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm' });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      convertToWavAndDownload(blob);
      Tone.getDestination().disconnect(dest);
    };
    mediaRecorder.start();
    recording = true;
    recordBtn.textContent = 'Stop';
    recordBtn.classList.add('recording');
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    recording = false;
    recordBtn.textContent = 'Record';
    recordBtn.classList.remove('recording');
  }

  async function convertToWavAndDownload(webmBlob) {
    const arrayBuf = await webmBlob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioBuffer;
    try {
      audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
    } catch(e) {
      // Fallback: download as webm
      downloadBlob(webmBlob, 'recording.webm');
      audioCtx.close();
      return;
    }
    const wavBlob = encodeWav(audioBuffer);
    downloadBlob(wavBlob, 'recording.wav');
    audioCtx.close();
  }

  function encodeWav(audioBuffer) {
    const numChannels = audioBuffer.numberOfChannels;
    const sampleRate = audioBuffer.sampleRate;
    const format = 1; // PCM
    const bitsPerSample = 16;
    const channels = [];
    for (let i = 0; i < numChannels; i++) {
      channels.push(audioBuffer.getChannelData(i));
    }
    const numSamples = audioBuffer.length;
    const bytesPerSample = bitsPerSample / 8;
    const blockAlign = numChannels * bytesPerSample;
    const byteRate = sampleRate * blockAlign;
    const dataSize = numSamples * blockAlign;
    const headerSize = 44;
    const buffer = new ArrayBuffer(headerSize + dataSize);
    const view = new DataView(buffer);

    // RIFF header
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, format, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);

    let offset = 44;
    for (let i = 0; i < numSamples; i++) {
      for (let ch = 0; ch < numChannels; ch++) {
        let sample = channels[ch][i];
        sample = Math.max(-1, Math.min(1, sample));
        sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
        view.setInt16(offset, sample, true);
        offset += 2;
      }
    }

    return new Blob([buffer], { type: 'audio/wav' });
  }

  function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
      view.setUint8(offset + i, str.charCodeAt(i));
    }
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ── Overlay / Audio Start ──────────────────────────────────
  overlay.addEventListener('click', async () => {
    await Tone.start();
    audioStarted = true;
    buildSynth(0);
    overlay.classList.add('hidden');
  });

  // ── Init ───────────────────────────────────────────────────
  buildKeys();
  // Initial slide after layout
  requestAnimationFrame(() => {
    updateVisibleOctaves();
  });

  // ── Test API ───────────────────────────────────────────────
  Object.defineProperty(window, '__pianoState', {
    get() {
      return {
        audioStarted,
        inputMode,
        feedbackMode,
        recording,
        startOctaveIdx,
        visibleOctaves,
        totalOctaves: TOTAL_OCTAVES,
        baseOctave: BASE_OCTAVE,
        currentPreset: PRESETS[parseInt(presetSelect.value)].name,
        activeNotes: [...activePointers.values()],
        pressedKeys: [...track.querySelectorAll('.pressed')].map(el => el.dataset.note)
      };
    }
  });

})();
</script>
</body>
</html>
